# 標準テンプレート: shitsuji → kaseifu 用 QC結果 YAML
# 配置先: queue/shitsuji_qc_{maid_NN}.yaml
# 使い方: 執事がメイドの成果物を点検した結果を本形式で出力。

task_id: "task_{NNN}_maid_{NN}"      # 必須: 検査対象 task と一致
from: "shitsuji"                     # 必須: 固定
to: "kaseifu"                        # 必須: 固定
reviewed_maid: "maid_{NN}"           # 必須: 検査対象メイド
scope_match: true                    # 必須: target_files / constraints を逸脱していないか
acceptance_check:                    # 必須: task の acceptance_criteria 各項
  criterion_1: "true/false"
test_passed: true                    # 必須: テスト実行結果（不要なら null）
build_passed: true                   # 必須: ビルド結果（不要なら null）
# <!-- task_055_followup_04 --> verdict 値表記を実運用 (pass/fail/redo) に統一。
# 旧表記 (accept/reject) は廃止: accept→pass, reject→fail と読み替える。
verdict: "pass"                      # 必須: pass / fail / redo
comments: ""                         # 推奨: 指摘・補足
# notify_status: 完了通知の送信結果 (improvement_1_c / gap_1_1+1_2 対応)
# 執事も家政婦への QC 結果通知の rc を記録する (report YAML 共通スキーマと同形式)。
# mailbox_rc=0 で正規完了。mailbox 失敗時は tmux fallback の rc を tmux_rc に記録。
notify_status:
  sent: yes                          # yes/no: 通知を送信したか
  mailbox_rc: 0                      # int: scripts/inbox_write.sh の終了コード
  tmux_rc: -1                        # int: tmux fallback の終了コード (未使用は -1)
  fallback_used: no                  # yes/no: tmux fallback を使ったか
# severity: needs_review 発火時の処理優先度 (task_062g / improvement_3_a)
# 詳細は instructions/common/forbidden_actions.md
# 「## needs_review 発火閾値の具体例」を参照 (report_template.yaml と同一定義)。
# low / medium / high / critical の 4 段階。
# 執事 verdict が fail / redo の場合、severity を high 以上にすることが多い。
severity: low                        # low / medium / high / critical
