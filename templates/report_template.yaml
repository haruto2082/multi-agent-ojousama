# 標準テンプレート: maid → kaseifu 用 report YAML
# 配置先: queue/maid_{NN}_report.yaml
# 使い方: タスク完了時に本ファイル形式で上書き出力する。
#
# メイドは "evidence の列挙" が主責務。pass/fail の最終判定は執事QC (qc_template.yaml) で行う。

task_id: "task_{NNN}_maid_{NN}"      # 必須: 受領した task YAML と一致させる
from: "maid_{NN}"                    # 必須
to: "kaseifu"                        # 必須: 固定
phase: "implementation"              # 任意: 受領 task と同じ
status: "done"                       # 必須: assigned / in_progress / done / failed
summary: ""                          # 必須: 実施内容を2〜3文
files_created: []                    # 必須: 新規作成したファイル
files_modified: []                   # 必須: 変更したファイル
# acceptance_check の各項目には evidence を必ず記載する
# 推奨: 構造化形式 (criterion → evidence 必須)
# acceptance_check:
#   criterion_1:
#     statement: "<criterion 文面>"
#     evidence: "<grep/diff出力 or 該当ファイル+行番号 or コマンド結果>"
#     self_assessment: "likely_pass / uncertain / likely_fail"  # pass/fail 断定はしない
# 互換: 既存スキーマの簡易記述 (criterion_1: "true") も引き続き許容する。
acceptance_check:                    # 推奨: task の acceptance_criteria に対する自己確認
  criterion_1:
    statement: ""
    evidence: ""
    self_assessment: "likely_pass"
errors: null                         # 失敗時のみ: エラー要約
# notify_status: 完了通知の送信結果 (improvement_1_c / gap_1_1+1_2 対応)
# executor が自分の通知 rc を明示記録 → 家政婦が Read 時点で「送ったが届いてない」を判断可能。
# mailbox_rc=0 で正規完了。mailbox 失敗時は tmux fallback を試し fallback_used=yes / tmux_rc を記録。
# 両方失敗なら sent=no で needs_review に切替。
notify_status:
  sent: yes                          # yes/no: 通知を送信したか
  mailbox_rc: 0                      # int: scripts/inbox_write.sh の終了コード
  tmux_rc: -1                        # int: tmux fallback の終了コード (未使用は -1)
  fallback_used: no                  # yes/no: tmux fallback を使ったか
# severity: needs_review 発火時の処理優先度 (task_062g / improvement_3_a)
# 本フィールドは instructions/common/forbidden_actions.md の
# 「## needs_review 発火閾値の具体例」とセットで運用する。
# low      = 通常の completed report (= 既定)。上申不要、家政婦は通常処理。
# medium   = グレーゾーン上申 (target_files 部分不在 / L3/L4 境界 / 前例なし等)。
#            次サイクルまでに家政婦が判断。
# high     = 必須上申 (acceptance 解釈不能 / 既存規範との矛盾 / cross-repo 等)。
#            同サイクル内で集約報告に含めお嬢様判断を仰ぐ。
# critical = F-RULE-09 / D-RULE 抵触兆候。即時 notify_human.sh 並行発火。
severity: low                        # low / medium / high / critical
skill_candidate:                     # 任意: 今回の経験で再利用価値のある手順
  found: false                       # true/false
  description: ""                    # 何をスキル化できそうか
