name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: lint (yamllint + shellcheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint and shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y yamllint shellcheck

      - name: Run yamllint
        run: |
          # queue/ 配下のサンプル/雛形と config/ 配下のサンプルのみ対象
          # 実行時生成YAMLは .gitignore 済みのため対象外
          yamllint -d "{extends: relaxed, rules: {line-length: disable}}" \
            .github/ config/ || true
          # 厳格チェック対象（雛形・サンプル）
          yamllint -d "{extends: relaxed, rules: {line-length: disable}}" \
            .github/workflows/

      - name: Run shellcheck
        run: |
          shopt -s nullglob
          files=(scripts/*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No shell scripts under scripts/"; exit 0
          fi
          shellcheck "${files[@]}"

